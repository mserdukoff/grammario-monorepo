version: '3.8'

services:
  backend:
    build: 
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - OPENROUTER_KEY=${OPENROUTER_KEY}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - LLM_MODEL=${LLM_MODEL}
      # Backend runs on 0.0.0.0:8000 inside container
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      # Use the service name 'backend' to talk to the backend container
      - API_URL=http://backend:8000
    depends_on:
      - backend
    restart: unless-stopped

