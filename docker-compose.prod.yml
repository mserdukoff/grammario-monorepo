# Production Docker Compose for Grammario
# Usage: docker compose -f docker-compose.prod.yml up -d

version: '3.8'

services:
  redis:
    image: redis:7-alpine
    container_name: grammario-redis
    restart: always
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.prod
    container_name: grammario-backend
    restart: always
    ports:
      - "8000:8000"
    depends_on:
      redis:
        condition: service_healthy
    environment:
      # LLM Configuration
      - OPENROUTER_KEY=${OPENROUTER_KEY}
      - LLM_MODEL=${LLM_MODEL:-anthropic/claude-sonnet-4}
      
      # Supabase Configuration
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_JWT_SECRET=${SUPABASE_JWT_SECRET}
      
      # CORS - Your Vercel frontend domain
      - CORS_ORIGINS=${CORS_ORIGINS:-https://grammario.ai,https://www.grammario.ai}
      
      # Stanza model configuration
      - MAX_LOADED_MODELS=${MAX_LOADED_MODELS:-5}
      - PRELOAD_MODELS=${PRELOAD_MODELS:-true}
      
      # Redis
      - REDIS_URL=redis://redis:6379/0
      
      # Production mode
      - DEBUG=false
    deploy:
      resources:
        limits:
          memory: 3500M  # Allow more with swap
        reservations:
          memory: 1024M
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      start_period: 300s  # 5 minutes - models take time to load
      retries: 5
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # Nginx reverse proxy with SSL
  nginx:
    image: nginx:alpine
    container_name: grammario-nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - ./certbot/conf:/etc/letsencrypt:ro
      - ./certbot/www:/var/www/certbot:ro
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "nginx", "-t"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Certbot for SSL certificate renewal
  certbot:
    image: certbot/certbot
    container_name: grammario-certbot
    volumes:
      - ./certbot/conf:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"

  # Optional: Watchtower for automatic updates
  watchtower:
    image: containrrr/watchtower
    container_name: grammario-watchtower
    restart: always
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - WATCHTOWER_CLEANUP=true
      - WATCHTOWER_POLL_INTERVAL=86400  # Check daily
      - WATCHTOWER_INCLUDE_STOPPED=false
    profiles:
      - autoupdate  # Only starts with --profile autoupdate

volumes:
  redis_data:

networks:
  default:
    name: grammario-network
